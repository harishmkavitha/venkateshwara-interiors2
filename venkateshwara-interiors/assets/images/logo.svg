<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 132" role="img" aria-label="Venkateshwara Interiors">
  <defs>
    <linearGradient id="lgGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFD89A"/>
      <stop offset="0.5" stop-color="#C9A24B"/>
      <stop offset="1" stop-color="#9A7A2E"/>
    </linearGradient>
    <linearGradient id="lgGold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E3C77A"/>
      <stop offset="1" stop-color="#B08C3A"/>
    </linearGradient>
  </defs>

  <!-- Emblem: temple arch + V + kalasham -->
  <g transform="translate(8,8)">
    <!-- outer roundel -->
    <circle cx="58" cy="58" r="56" fill="none" stroke="url(#lgGold)" stroke-width="2.5"/>
    <circle cx="58" cy="58" r="49" fill="none" stroke="url(#lgGold)" stroke-width="1" opacity="0.6"/>
    <!-- kalasham finial -->
    <path d="M58 8 l6 9 -6 6 -6 -6 Z" fill="url(#lgGold2)"/>
    <circle cx="58" cy="9" r="3.4" fill="url(#lgGold2)"/>
    <!-- gopuram arch -->
    <path d="M30 96 L30 60 Q30 26 58 26 Q86 26 86 60 L86 96"
          fill="none" stroke="url(#lgGold)" stroke-width="3.4" stroke-linecap="round"/>
    <!-- the V -->
    <path d="M40 44 L58 86 L76 44" fill="none" stroke="url(#lgGold2)" stroke-width="6.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- diya dot -->
    <circle cx="58" cy="100" r="3.6" fill="url(#lgGold)"/>
    <!-- side flourishes -->
    <path d="M16 70 q6 -8 12 0" fill="none" stroke="url(#lgGold)" stroke-width="2" opacity="0.7"/>
    <path d="M88 70 q6 -8 12 0" fill="none" stroke="url(#lgGold)" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(132,0)">
    <text x="0" y="62" font-family="'Cormorant Garamond', Georgia, serif" font-size="46"
          font-weight="700" letter-spacing="1.5" fill="#F6F1E7">Venkateshwara</text>
    <line x1="2" y1="78" x2="372" y2="78" stroke="url(#lgGold)" stroke-width="1.5"/>
    <text x="2" y="104" font-family="'Mukta', Arial, sans-serif" font-size="20.5"
          font-weight="500" letter-spacing="13.5" fill="#C9A24B">INTERIORS</text>
  </g>
</svg>
